<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, inital-scale=1" />
        <title>Tetris</title>
        <style>
            .game-tip {
                position: absolute;
                z-index: 1;
                top: 100px;
                left: 100px;
                display: none;
                color: #50ff;
                font-size: 30px;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <h3>W to rotate, <br>
            ASD to move around, <br>
            hit Space to pause
        </h3>
        <span>Score: </span><span id="score"></span>
        <br>
        <input id="game-start-button" type="button" value="Start" onclick="start();">
        <input id="game-pause-button" type="button" value="Pause" onclick="pause();">
        <div class="canvas-wrap">
            <canvas id="canvas"></canvas>
            <div id="game-over" class="game-tip">Game Ended</div>
            <div id="game-pause" class="game-tip">Game Paused</div>
        </div>
        <script src="Tetris.js"></script>
    </body>
</html>
